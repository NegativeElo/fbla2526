<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I Don't Feel So Good</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f0f4f8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
  }

  /* ── GAME CANVAS WRAPPER ── */
  #game-root {
    position: relative;
    width: 400px;
    height: 500px;
    background: white;
    border: 3px solid #ccc;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    user-select: none;
  }

  /* ── DEBUG OVERLAY ── */
  #debug {
    position: absolute;
    top: 5px; left: 5px;
    font-size: 9px;
    color: #aaa;
    z-index: 100;
    line-height: 1.6;
    pointer-events: none;
  }

  /* ── HUD ── */
  #hud {
    position: absolute;
    top: 60px; left: 5px;
    font-size: 12px;
    color: #222;
    z-index: 50;
    line-height: 1.8;
    pointer-events: none;
  }

  /* ── SYMPTOMS PANEL (top-right) ── */
  #symptoms-panel {
    position: absolute;
    top: 15px; left: 235px;
    width: 155px;
    font-size: 11px;
    color: #111;
    z-index: 50;
    pointer-events: none;
  }
  #symptoms-panel .sym-title {
    font-weight: 700;
    font-size: 12px;
    margin-bottom: 4px;
  }
  #symptoms-panel .sym-item {
    margin-bottom: 6px;
    line-height: 1.3;
    padding: 4px 6px;
    background: #f7f7f7;
    border-left: 3px solid #4caf50;
    border-radius: 2px;
  }

  /* ── START SCREEN ── */
  #start-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: white;
    z-index: 200;
  }
  #start-screen h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: #333;
    text-align: center;
    line-height: 1.8;
  }
  #start-btn {
    cursor: pointer;
    padding: 14px 28px;
    background: #2196f3;
    color: white;
    border: none;
    border-radius: 6px;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    transition: transform 0.1s, background 0.2s;
    box-shadow: 0 4px 0 #1565c0;
  }
  #start-btn:hover { background: #1976d2; transform: translateY(-2px); }
  #start-btn:active { transform: translateY(2px); box-shadow: none; }

  /* ── PATIENT SPRITE ── */
  #patient-wrap {
    position: absolute;
    bottom: 40px;
    left: 50px;
    width: 90px;
    height: 150px;
    z-index: 10;
    transition: left 0.3s;
  }
  #patient-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
  }

  /* ── HOVER BAR (left edge trigger) ── */
  #hover-bar {
    position: absolute;
    left: 0; top: 100px;
    width: 28px;
    height: 200px;
    cursor: pointer;
    z-index: 60;
    display: none;
  }
  #hover-bar-img {
    width: 100%;
    height: 100%;
    object-fit: fill;
    image-rendering: pixelated;
    opacity: 0.85;
  }

  /* ── DRAWER ── */
  #drawer {
    position: absolute;
    left: -120px;
    top: 60px;
    width: 120px;
    height: 290px;
    z-index: 55;
    transition: left 0.25s ease;
    display: none;
  }
  #drawer-img {
    width: 100%;
    height: 100%;
    object-fit: fill;
    image-rendering: pixelated;
  }

  /* ── CLIPBOARD (slides up from bottom) ── */
  #clipboard-wrap {
    position: absolute;
    left: 60px;
    top: 475px; /* starts off-screen, JS moves it */
    width: 170px;
    height: 280px;
    cursor: pointer;
    z-index: 70;
    display: none;
    transition: top 0.35s cubic-bezier(0.22,1,0.36,1);
  }
  #clipboard-bg {
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
    position: absolute;
    top: 0; left: 0;
  }

  /* Options on the clipboard */
  #options-layer {
    position: absolute;
    top: 38px; left: 28px;
    width: 120px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .option-row {
    display: flex;
    align-items: center;
    height: 50px;
    cursor: pointer;
    padding: 0 4px;
    border-radius: 4px;
    transition: background 0.1s;
  }
  .option-row:hover { background: rgba(0,0,0,0.06); }
  .option-checkbox {
    width: 22px; height: 22px;
    border: 2px solid #555;
    border-radius: 3px;
    margin-right: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    transition: background 0.15s;
  }
  .option-checkbox img {
    width: 18px; height: 18px;
    object-fit: contain;
    image-rendering: pixelated;
    display: none;
  }
  .option-label {
    font-size: 11px;
    font-weight: 600;
    color: #222;
    line-height: 1.2;
  }

  /* ── DIAGNOSE BUTTON (on clipboard) ── */
  #diagnose-btn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    cursor: pointer;
    display: none;
    z-index: 80;
    border: none;
    background: none;
    padding: 0;
  }
  #diagnose-btn img {
    height: 28px;
    image-rendering: pixelated;
  }

  /* ── NEXT / SKIP buttons ── */
  #next-btn, #skip-btn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    cursor: pointer;
    display: none;
    z-index: 90;
    border: none;
    background: none;
    padding: 0;
  }
  #next-btn img, #skip-btn img {
    height: 30px;
    image-rendering: pixelated;
  }

  /* ── CORRECT ANSWER TEXT ── */
  #correct-answer-text {
    position: absolute;
    bottom: 58px;
    left: 50%;
    transform: translateX(-50%);
    color: #d32f2f;
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    display: none;
    z-index: 90;
    background: rgba(255,255,255,0.9);
    padding: 3px 6px;
    border-radius: 4px;
    white-space: nowrap;
  }

  /* ── MODE BADGE ── */
  #mode-badge {
    position: absolute;
    top: 60px; left: 5px;
    font-size: 10px;
    font-weight: 700;
    display: none;
    z-index: 50;
    pointer-events: none;
  }

  /* ── CHALLENGE HINT ── */
  #challenge-hint {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    color: #888;
    white-space: nowrap;
    display: none;
    z-index: 50;
    pointer-events: none;
  }

  /* ── TIMER BAR ── */
  #timer-bar-wrap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 6px;
    background: #eee;
    z-index: 100;
    display: none;
  }
  #timer-bar {
    height: 100%;
    background: #4caf50;
    transition: width 0.05s linear, background 0.3s;
    width: 100%;
  }

  /* ── GAME OVER OVERLAY ── */
  #gameover-screen {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.95);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 300;
  }
  #gameover-screen h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: #c62828;
    text-align: center;
    line-height: 1.9;
  }
  #gameover-screen p {
    font-size: 14px;
    color: #333;
  }
  #play-again-btn {
    cursor: pointer;
    padding: 12px 24px;
    background: #43a047;
    color: white;
    border: none;
    border-radius: 6px;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    box-shadow: 0 4px 0 #2e7d32;
    transition: transform 0.1s;
  }
  #play-again-btn:hover { transform: translateY(-2px); }
  #play-again-btn:active { transform: translateY(2px); box-shadow: none; }
</style>
</head>
<body>

<div id="game-root">

  <!-- Debug -->
  <div id="debug"></div>

  <!-- HUD -->
  <div id="hud"></div>
  <div id="mode-badge"></div>

  <!-- Symptoms panel -->
  <div id="symptoms-panel">
    <div class="sym-title">Symptoms:</div>
    <div id="sym-list"></div>
  </div>

  <!-- Start Screen -->
  <div id="start-screen">
    <h1>I Don't Feel<br>So Good.</h1>
    <button id="start-btn">START</button>
    <p style="font-size:11px;color:#999;font-family:'Nunito',sans-serif;">Diagnose the patient!</p>
  </div>

  <!-- Game Over Screen -->
  <div id="gameover-screen">
    <h2>TIME'S UP!</h2>
    <p id="final-score"></p>
    <button id="play-again-btn">PLAY AGAIN</button>
  </div>

  <!-- Hover Bar (left edge) -->
  <div id="hover-bar">
    <img id="hover-bar-img" src="../Sprites/hoverbar.png" alt="">
  </div>

  <!-- Drawer -->
  <div id="drawer">
    <img id="drawer-img" src="../Sprites/drawer.png" alt="">
  </div>

  <!-- Patient -->
  <div id="patient-wrap">
    <img id="patient-img" src="../Sprites/patientStanding.png" alt="patient">
  </div>

  <!-- Clipboard -->
  <div id="clipboard-wrap">
    <img id="clipboard-bg" src="../Sprites/clipboard.png" alt="clipboard">
    <div id="options-layer">
      <!-- Filled by JS -->
    </div>
    <!-- Diagnose button sits inside clipboard coords -->
    <button id="diagnose-btn">
      <img src="../Sprites/diagnose.png" alt="Diagnose">
    </button>
  </div>

  <!-- Correct answer text -->
  <div id="correct-answer-text"></div>

  <!-- Next / Skip -->
  <button id="next-btn"><img src="../Sprites/next.png" alt="Next"></button>
  <button id="skip-btn"><img src="../Sprites/skip.png" alt="Skip"></button>

  <!-- Challenge hint -->
  <div id="challenge-hint">Press C to switch to Challenge Mode</div>

  <!-- Timer bar -->
  <div id="timer-bar-wrap"><div id="timer-bar"></div></div>

</div>

<script>
// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function randomNumber(lo, hi) {
  return Math.floor(Math.random() * (hi - lo + 1)) + lo;
}

// ─────────────────────────────────────────────
//  DISEASE DATA
// ─────────────────────────────────────────────
const diseaseList = [
  {name:"Flu",patientSymptoms:["I have a high fever","My body aches all over","I have a dry cough"]},
  {name:"Food Poisoning",patientSymptoms:["My stomach is cramping","I feel very nauseous","I've been vomiting"]},
  {name:"Allergies",patientSymptoms:["My eyes are itchy","I can't stop sneezing","My nose is runny"]},
  {name:"Migraine",patientSymptoms:["Light hurts my eyes","I have a pounding headache","I feel dizzy"]},
  {name:"Common Cold",patientSymptoms:["I have a sore throat","My nose is stuffed up","I am sneezing a lot"]},
  {name:"Bronchitis",patientSymptoms:["I'm coughing up thick mucus","My chest feels tight","I feel short of breath"]},
  {name:"Strep Throat",patientSymptoms:["It hurts a lot when I swallow","My tonsils look red and swollen","I have a fever"]},
  {name:"Conjunctivitis",patientSymptoms:["My eyes are very red","There is a crusty discharge on my eyelids","My eyes feel gritty"]},
  {name:"Asthma",patientSymptoms:["I am wheezing when I breathe","I have a persistent cough at night","My chest feels compressed"]},
  {name:"Vertigo",patientSymptoms:["The room feels like it is spinning","I am losing my balance","I feel like I'm tilting to one side"]},
  {name:"Pneumonia",patientSymptoms:["I have sharp chest pain when I breathe","I'm coughing up green phlegm","I have the chills"]},
  {name:"Anxiety",patientSymptoms:["My heart is racing for no reason","My hands won't stop shaking","I feel a sense of impending doom"]},
  {name:"Gastroenteritis",patientSymptoms:["I have watery diarrhea","I have a low-grade fever","My stomach feels bloated and crampy"]},
  {name:"Hypoglycemia",patientSymptoms:["I feel suddenly shaky and weak","I am sweating profusely","I'm having trouble concentrating"]},
  {name:"Eczema",patientSymptoms:["My skin is extremely dry and scaly","The rash is itching uncontrollably","My skin looks red and inflamed"]},
  {name:"Insomnia",patientSymptoms:["I lie awake for hours at night","I wake up feeling exhausted","I can't stay asleep during the night"]},
  {name:"UTI",patientSymptoms:["I feel a burning sensation when I pee","I have a constant urge to go","My lower back is aching"]},
  {name:"Acid Reflux",patientSymptoms:["I have a burning feeling in my chest","There is a sour taste in my mouth","It's hard to swallow after eating"]},
  {name:"Sinusitis",patientSymptoms:["I have pressure behind my cheeks and eyes","My sense of smell is gone","I have thick yellow nasal discharge"]},
  {name:"Mono",patientSymptoms:["I am extremely tired all the time","My neck glands are very swollen","I have a severe sore throat"]},
  {name:"Lyme Disease",patientSymptoms:["I have a bullseye-shaped rash","My joints are stiff and painful","I have a lingering headache"]},
  {name:"Shingles",patientSymptoms:["I have a painful, blistering rash on one side","My skin feels tingly and sensitive","I have a localized burning sensation"]},
  {name:"Anemia",patientSymptoms:["I feel weak and short of breath","My skin looks very pale","My hands and feet are always cold"]},
  {name:"Kidney Stones",patientSymptoms:["I have sharp pain in my side and back","There is blood in my urine","I feel nauseous from the intense pain"]},
  {name:"Carpal Tunnel",patientSymptoms:["My thumb and fingers feel numb","I have a tingling 'pins and needles' sensation in my hand","I keep dropping things because of weakness"]},
  {name:"Sleep Apnea",patientSymptoms:["My partner says I snore very loudly","I wake up gasping for air","I have a dry mouth in the morning"]},
  {name:"Hyperthyroidism",patientSymptoms:["I am losing weight without trying","I feel irritable and nervous","I can't stand being in the heat"]},
  {name:"Gallstones",patientSymptoms:["I have sudden pain in the upper right abdomen","The pain spreads to my right shoulder","I feel sick after eating greasy food"]},
  {name:"Gout",patientSymptoms:["My big toe is red and swollen","The joint is excruciatingly tender to touch","The pain started suddenly at night"]},
  {name:"Psoriasis",patientSymptoms:["I have thick red patches with silvery scales","My skin is cracked and bleeding","My joints feel swollen and stiff"]}
];

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let gameActive = false;
let gameMode = null;      // null | "practice" | "challenge"
let points = 0;
const TIMER_MAX = 3600;   // frames at 60fps = 2 min
let timer = TIMER_MAX;
let timerActive = false;

let currentDisease = null;
let clipboardOptions = [];
let pendingAnswer = null;
let selectedAnswer = null;
let diagnosed = false;
let wrongDelay = 0;

// Clipboard state
let clipboardOpen = false;

// Drawer state
let drawerOpen = false;

// ─────────────────────────────────────────────
//  DOM REFS
// ─────────────────────────────────────────────
const root          = document.getElementById('game-root');
const startScreen   = document.getElementById('start-screen');
const gameoverScreen= document.getElementById('gameover-screen');
const finalScore    = document.getElementById('final-score');
const startBtn      = document.getElementById('start-btn');
const playAgainBtn  = document.getElementById('play-again-btn');
const debugEl       = document.getElementById('debug');
const hudEl         = document.getElementById('hud');
const modeBadge     = document.getElementById('mode-badge');
const symList       = document.getElementById('sym-list');
const sympPanel     = document.getElementById('symptoms-panel');

const patientImg    = document.getElementById('patient-img');
const patientWrap   = document.getElementById('patient-wrap');

const hoverBarEl    = document.getElementById('hover-bar');
const drawerEl      = document.getElementById('drawer');

const clipboardWrap = document.getElementById('clipboard-wrap');
const optionsLayer  = document.getElementById('options-layer');
const diagnoseBtnEl = document.getElementById('diagnose-btn');

const nextBtnEl     = document.getElementById('next-btn');
const skipBtnEl     = document.getElementById('skip-btn');
const correctAnsEl  = document.getElementById('correct-answer-text');
const challengeHint = document.getElementById('challenge-hint');

const timerBarWrap  = document.getElementById('timer-bar-wrap');
const timerBar      = document.getElementById('timer-bar');

// ─────────────────────────────────────────────
//  GAME LOGIC
// ─────────────────────────────────────────────
function generateOptions() {
  const wrong = [];
  while (wrong.length < 3) {
    const pick = diseaseList[randomNumber(0, diseaseList.length - 1)];
    if (pick.name !== currentDisease.name && !wrong.find(w => w.name === pick.name)) {
      wrong.push(pick);
    }
  }
  clipboardOptions = [currentDisease, ...wrong];
  // Fisher-Yates shuffle
  for (let i = clipboardOptions.length - 1; i > 0; i--) {
    const j = randomNumber(0, i);
    [clipboardOptions[i], clipboardOptions[j]] = [clipboardOptions[j], clipboardOptions[i]];
  }
}

function renderSymptoms() {
  symList.innerHTML = '';
  currentDisease.patientSymptoms.forEach(s => {
    const d = document.createElement('div');
    d.className = 'sym-item';
    d.textContent = s;
    symList.appendChild(d);
  });
}

function renderOptions() {
  optionsLayer.innerHTML = '';
  clipboardOptions.forEach((opt, i) => {
    const row = document.createElement('div');
    row.className = 'option-row';
    row.dataset.index = i;

    const box = document.createElement('div');
    box.className = 'option-checkbox';
    box.id = `cb-${i}`;

    const ckImg = document.createElement('img');
    ckImg.src = '../Sprites/checkmark.png';
    ckImg.alt = '';
    ckImg.style.imageRendering = 'pixelated';
    box.appendChild(ckImg);

    const lbl = document.createElement('span');
    lbl.className = 'option-label';
    lbl.textContent = opt.name;

    row.appendChild(box);
    row.appendChild(lbl);

    row.addEventListener('click', () => handleOptionClick(i));
    optionsLayer.appendChild(row);
  });
}

function handleOptionClick(idx) {
  if (diagnosed) return;
  pendingAnswer = clipboardOptions[idx];

  // update checkboxes visually
  document.querySelectorAll('.option-checkbox img').forEach(img => img.style.display = 'none');
  const box = document.getElementById(`cb-${idx}`);
  if (box) box.querySelector('img').style.display = 'block';

  diagnoseBtnEl.style.display = 'block';
}

function handleDiagnose() {
  if (pendingAnswer === null) return;
  selectedAnswer = pendingAnswer;
  diagnosed = true;
  diagnoseBtnEl.style.display = 'none';

  if (selectedAnswer.name === currentDisease.name) {
    // correct
    if (gameMode === 'challenge') points++;
    nextRound();
  } else {
    // wrong
    // show red X on the selected option
    const selIdx = clipboardOptions.indexOf(selectedAnswer);
    const box = document.getElementById(`cb-${selIdx}`);
    if (box) {
      const img = box.querySelector('img');
      img.src = '../Sprites/wrongmark.png';
      img.style.display = 'block';
    }

    if (gameMode === 'practice') {
      correctAnsEl.textContent = `Correct answer: ${currentDisease.name}`;
      correctAnsEl.style.display = 'block';
      nextBtnEl.style.display = 'block';
    } else {
      // challenge: retry after delay
      diagnosed = false;
      pendingAnswer = null;
      selectedAnswer = null;
      wrongDelay = 90;
    }
  }
}

function nextRound() {
  currentDisease = diseaseList[randomNumber(0, diseaseList.length - 1)];
  generateOptions();
  renderSymptoms();
  renderOptions();

  pendingAnswer = null;
  selectedAnswer = null;
  diagnosed = false;
  wrongDelay = 0;

  correctAnsEl.style.display = 'none';
  diagnoseBtnEl.style.display = 'none';
  nextBtnEl.style.display = 'none';

  // close clipboard
  closeClipboard();
}

function openClipboard() {
  clipboardOpen = true;
  clipboardWrap.style.display = 'block';
  requestAnimationFrame(() => {
    clipboardWrap.style.top = '200px';
  });
  patientWrap.style.left = '230px';
  patientImg.src = '../Sprites/patient.png';
}

function closeClipboard() {
  clipboardOpen = false;
  clipboardWrap.style.top = '475px';
  setTimeout(() => {
    if (!clipboardOpen) clipboardWrap.style.display = 'none';
  }, 400);
  // reset patient position
  patientWrap.style.left = '50px';
  patientImg.src = '../Sprites/patient.png';

  // reset option checkboxes
  document.querySelectorAll('.option-checkbox img').forEach(img => {
    img.style.display = 'none';
    img.src = '../Sprites/checkmark.png';
  });
  pendingAnswer = null;
  selectedAnswer = null;
  diagnosed = false;
  diagnoseBtnEl.style.display = 'none';
  correctAnsEl.style.display = 'none';
}

function openDrawer() {
  drawerOpen = true;
  drawerEl.style.display = 'block';
  drawerEl.style.left = '0px';
}

function closeDrawer() {
  drawerOpen = false;
  drawerEl.style.left = '-120px';
  setTimeout(() => {
    if (!drawerOpen) drawerEl.style.display = 'none';
  }, 300);
}

function startGame(mode) {
  gameMode = mode;
  gameActive = true;
  startScreen.style.display = 'none';

  currentDisease = diseaseList[randomNumber(0, diseaseList.length - 1)];
  generateOptions();
  renderSymptoms();
  renderOptions();

  hoverBarEl.style.display = 'block';
  sympPanel.style.display = 'block';

  if (mode === 'practice') {
    modeBadge.style.color = 'blue';
    modeBadge.textContent = 'Practice Mode';
    modeBadge.style.display = 'block';
    challengeHint.style.display = 'block';
  } else {
    startChallenge();
  }
}

function startChallenge() {
  gameMode = 'challenge';
  points = 0;
  timer = TIMER_MAX;
  timerActive = true;
  modeBadge.style.color = '#c62828';
  modeBadge.textContent = 'Challenge Mode';
  modeBadge.style.display = 'block';
  challengeHint.style.display = 'none';
  skipBtnEl.style.display = 'block';
  timerBarWrap.style.display = 'block';
  timerBar.style.width = '100%';
  timerBar.style.background = '#4caf50';
}

function showGameOver() {
  gameActive = false;
  gameMode = null;
  timerBarWrap.style.display = 'none';
  skipBtnEl.style.display = 'none';
  closeClipboard();
  closeDrawer();
  hoverBarEl.style.display = 'none';
  sympPanel.style.display = 'none';
  modeBadge.style.display = 'none';
  challengeHint.style.display = 'none';
  finalScore.textContent = `Your score: ${points} diagnoses!`;
  gameoverScreen.style.display = 'flex';
}

function resetToStart() {
  gameoverScreen.style.display = 'none';
  startScreen.style.display = 'flex';
  patientWrap.style.left = '50px';
  patientImg.src = '../Sprites/patientStanding.png';
  hudEl.textContent = '';
}

// ─────────────────────────────────────────────
//  GAME LOOP (60fps via requestAnimationFrame)
// ─────────────────────────────────────────────
let lastTime = 0;
const FRAME_MS = 1000 / 60;

function loop(ts) {
  requestAnimationFrame(loop);
  if (ts - lastTime < FRAME_MS) return;
  lastTime = ts;

  if (!gameActive) return;

  // HUD
  if (gameMode === 'challenge') {
    const secLeft = Math.ceil(timer / 60);
    hudEl.innerHTML = `Points: ${points}<br>Time: ${secLeft}s`;

    // Timer
    if (timerActive && wrongDelay === 0) {
      timer--;
      const pct = timer / TIMER_MAX * 100;
      timerBar.style.width = pct + '%';
      if (pct < 25) timerBar.style.background = '#e53935';
      else if (pct < 50) timerBar.style.background = '#fb8c00';
      else timerBar.style.background = '#4caf50';

      if (timer <= 0) {
        timer = 0;
        timerActive = false;
        showGameOver();
        return;
      }
    }
  } else {
    hudEl.innerHTML = '';
  }

  // Wrong delay countdown
  if (wrongDelay > 0) {
    wrongDelay--;
    if (wrongDelay === 0) {
      diagnosed = false;
      pendingAnswer = null;
      selectedAnswer = null;
      // reset checkboxes
      document.querySelectorAll('.option-checkbox img').forEach(img => {
        img.style.display = 'none';
        img.src = '../Sprites/checkmark.png';
      });
    }
  }

  // Debug
  debugEl.innerHTML = `clipOpen:${clipboardOpen} | mode:${gameMode} | diagnosed:${diagnosed}`;
}

requestAnimationFrame(loop);

// ─────────────────────────────────────────────
//  EVENT LISTENERS
// ─────────────────────────────────────────────

// Start
startBtn.addEventListener('click', () => startGame('practice'));

// Play again
playAgainBtn.addEventListener('click', resetToStart);

// Hover bar → open clipboard
hoverBarEl.addEventListener('click', () => {
  if (!clipboardOpen) openClipboard();
});

// Hover bar hover → open/close drawer
hoverBarEl.addEventListener('mouseenter', () => {
  if (gameActive) openDrawer();
});
hoverBarEl.addEventListener('mouseleave', () => {
  // small delay so user can move onto drawer
  setTimeout(() => {
    if (!drawerEl.matches(':hover')) closeDrawer();
  }, 150);
});
drawerEl.addEventListener('mouseleave', () => {
  if (!hoverBarEl.matches(':hover')) closeDrawer();
});

// Click outside clipboard to close
root.addEventListener('click', (e) => {
  if (!clipboardOpen) return;
  const inClip = clipboardWrap.contains(e.target);
  const inDiag = diagnoseBtnEl.contains(e.target);
  if (!inClip && !inDiag) closeClipboard();
});

// Diagnose button
diagnoseBtnEl.addEventListener('click', (e) => {
  e.stopPropagation();
  handleDiagnose();
});

// Next button (practice wrong answer)
nextBtnEl.addEventListener('click', () => nextRound());

// Skip button (challenge)
skipBtnEl.addEventListener('click', () => nextRound());

// Keyboard: press C in practice to switch to challenge
document.addEventListener('keydown', (e) => {
  if (e.key === 'c' || e.key === 'C') {
    if (gameActive && gameMode === 'practice') {
      nextRound();
      startChallenge();
    }
  }
});
</script>
</body>
